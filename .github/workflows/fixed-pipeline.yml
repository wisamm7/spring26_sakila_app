name: Fixed CI Pipeline

on:
  push:
    branches: [feature/ci-pipeline]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymysql pytest

      - name: Test MySQL connection
        run: |
          python - <<'PY'
          import time
          import pymysql

          for i in range(20):
              try:
                  conn = pymysql.connect(
                      host="127.0.0.1",
                      user="root",
                      password="admin",
                      database="sakila",
                      port=3306
                  )
                  with conn.cursor() as cur:
                      cur.execute("SELECT DATABASE();")
                      print("Database connected:", cur.fetchone())
                  conn.close()
                  print("Fixed pipeline test passed")
                  break
              except Exception as e:
                  print("Waiting for MySQL...", e)
                  time.sleep(5)
          else:
              raise SystemExit("MySQL connection failed")
          PY

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sakila-app:fixed .

      - name: Verify image
        run: docker images | grep sakila-app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy simulation
        run: echo "Fixed pipeline deployed successfully after test and build."
