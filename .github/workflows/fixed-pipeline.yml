name: Fixed CI Pipeline

on:
  push:
    branches: [feature/ci-pipeline]
  workflow_dispatch:

env:
  MYSQL_HOST: 127.0.0.1
  MYSQL_USER: root
  MYSQL_PASSWORD: admin
  MYSQL_DB: sakila

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client wget unzip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Import Sakila database
        run: |
          wget -O sakila-db.zip https://downloads.mysql.com/docs/sakila-db.zip
          unzip -o sakila-db.zip -d sakila-db
          mysql -h 127.0.0.1 -uroot -padmin < sakila-db/sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -padmin < sakila-db/sakila-db/sakila-data.sql

      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sakila-app:fixed .

      - name: Verify image
        run: docker images | grep sakila-app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy simulation
        run: echo "Fixed pipeline deployed successfully after test and build."
