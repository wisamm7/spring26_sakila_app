name: Deployment Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Staging deployment
        run: |
          echo "Deploying Sakila app to staging"
          echo "Staging deployment successful"
          echo "## Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY

  production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: staging
    steps:
      - uses: actions/checkout@v4
      - name: Production deployment
        run: |
          echo "Deploying Sakila app to production"
          echo "Production deployment successful"
          echo "## Production Deployment Successful" >> $GITHUB_STEP_SUMMARY

      - name: Create release note
        run: |
          echo "Production Release for Sakila Flask DevOps Pipeline" > release-notes.txt
          echo "Commit: $GITHUB_SHA" >> release-notes.txt
          cat release-notes.txt

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: production-release-notes
          path: release-notes.txt
