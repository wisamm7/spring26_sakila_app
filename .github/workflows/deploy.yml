name: Deployment Workflow

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: sakila-app
  STAGING_ENV: staging
  PRODUCTION_ENV: production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print staging environment variables
        run: |
          echo "Environment: $STAGING_ENV"
          echo "Image: $IMAGE_NAME"
          echo "Commit SHA: $GITHUB_SHA"

      - name: Build staging Docker image
        run: docker build -t $IMAGE_NAME:staging-${{ github.sha }} .

      - name: Run staging image simulation
        run: |
          docker run --rm $IMAGE_NAME:staging-${{ github.sha }} python -c "print('Staging deployment simulation successful')"

      - name: Write staging job summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: staging" >> $GITHUB_STEP_SUMMARY
          echo "- Image: $IMAGE_NAME:staging-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Successful" >> $GITHUB_STEP_SUMMARY

      - name: Staging notification
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate release tag
        run: echo "TAG_NAME=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_ENV

      - name: Simulate production deployment
        run: |
          echo "Deploying $IMAGE_NAME to production..."
          echo "Production deployment successful for commit $GITHUB_SHA"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Production Release $TAG_NAME" \
            --notes "Automated production release from Deployment Workflow." \
            --target "$GITHUB_SHA"

      - name: Production notification
        run: echo "Slack notification: Deployment to production successful"
