name: CI Pipeline

on:
  push:
    branches: [main, develop, feature/ci-pipeline]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app
  MYSQL_HOST: 127.0.0.1
  MYSQL_USER: root
  MYSQL_PASSWORD: admin
  MYSQL_DB: sakila

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run flake8 lint check
        run: |
          pip install flake8
          flake8 app.py config.py tests/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exit-zero

  test:
    name: Test with MySQL
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client wget unzip
          pip install -r requirements.txt
          pip install pytest pymysql

      - name: Load Sakila database
        run: |
          wget -O sakila-db.zip https://downloads.mysql.com/docs/sakila-db.zip
          unzip -o sakila-db.zip -d sakila-db
          mysql -h 127.0.0.1 -uroot -padmin < sakila-db/sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -padmin < sakila-db/sakila-db/sakila-data.sql
          mysql -h 127.0.0.1 -uroot -padmin -e "SELECT COUNT(*) FROM sakila.actor;"

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Verify Docker image exists
        run: docker images | grep $IMAGE_NAME

      - name: Inspect image healthcheck and labels
        run: docker inspect $IMAGE_NAME:${{ github.sha }}

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          output: trivy-results.txt
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.txt
